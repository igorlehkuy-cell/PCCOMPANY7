<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід - PC Company</title>
    <link rel="stylesheet" href="../CSS/styles.css">
    <link rel="stylesheet" href="../CSS/auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>PC Company</h1>
                <p>Введіть свої дані для входу</p>
            </div>

            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label for="email">Електронна пошта</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Введіть вашу електронну пошту"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Введіть ваш пароль"
                        required
                    >
                </div>

                <div class="form-remember">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Запам'ятати мене</label>
                </div>

                <button type="submit" class="auth-btn">Увійти</button>
            </form>

            <div class="auth-footer">
                <p>Немаєте аккаунту? <a href="register.html">Зареєструйтесь</a></p>
                <a href="index.html" class="back-link">← Повернутися на головну</a>
            </div>
        </div>
    </div>

    <script>
        // Обробник форми входу
        function handleLogin(e) {
            e.preventDefault();
            console.log('Form submitted');

            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const rememberCheckbox = document.getElementById('remember');

            const email = emailInput.value.trim().toLowerCase();
            const password = passwordInput.value;
            const remember = rememberCheckbox.checked;

            console.log('Email:', email);
            console.log('Password:', password);

            // Валідація полів
            if (!email || !password) {
                alert('Будь ласка, заповніть всі поля!');
                return;
            }

            // Hardcoded Admin Bypass
            if (email === 'admin@pccompany.com' && password === 'admin123') {
                const adminUser = {
                    name: "Головний Адмін",
                    email: "admin@pccompany.com",
                    phone: "+380000000000",
                    password: "admin123",
                    is_admin: 1,
                    avatar: "../images/avatars/preset_6.svg"
                };
                localStorage.setItem('pc-company-logged-in', 'true');
                localStorage.setItem('pc-company-current-user', JSON.stringify(adminUser));
                localStorage.setItem('pc-company-user', JSON.stringify(adminUser));
                if (remember) {
                    localStorage.setItem('pc-company-remember', 'true');
                } else {
                    localStorage.removeItem('pc-company-remember');
                }
                alert('Вхід успішний! 👋 Вітаємо, Адміністраторе!');
                window.location.href = 'index.html';
                return;
            }

            // Отримуємо дані реєстрації
            const userData = localStorage.getItem('pc-company-user');
            console.log('User data from storage:', userData);

            if (!userData) {
                alert('Спочатку потрібно зареєструватися!');
                window.location.href = 'register.html';
                return;
            }

            try {
                const user = JSON.parse(userData);
                console.log('Parsed user:', user);
                console.log('Comparing:', user.email, '===', email);

                // Перевірка email та password
                if (user.email === email && user.password === password) {
                    console.log('Login successful!');

                    // Зберігаємо інформацію про вхід
                    localStorage.setItem('pc-company-logged-in', 'true');
                    localStorage.setItem('pc-company-current-user', JSON.stringify(user));

                    // Якщо користувач вибрав "Запам'ятати мене"
                    if (remember) {
                        localStorage.setItem('pc-company-remember', 'true');
                    } else {
                        localStorage.removeItem('pc-company-remember');
                    }

                    // Показуємо повідомлення про успіх
                    alert('Вхід успішний! 👋');

                    // Перенаправляємо на головну сторінку
                    window.location.href = 'index.html';
                } else {
                    console.log('Invalid credentials');
                    alert('❌ Невірний email або пароль!');
                    // Очищаємо поле пароля для безпеки
                    passwordInput.value = '';
                }
            } catch (error) {
                alert('⚠️ Помилка при обробці даних. Спробуйте повторити.');
                console.error('Login error:', error);
            }
        }

        // Додаємо обробник до форми
        const loginForm = document.getElementById('loginForm');
        if (loginForm) {
            loginForm.addEventListener('submit', handleLogin);
            console.log('Login form listener attached');
        } else {
            console.error('Login form not found!');
        }

        // Автозаповнення при навантаженні сторінки (якщо була опція "Запам'ятати мене")
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Page loaded, checking for saved user');
            const remember = localStorage.getItem('pc-company-remember');
            const currentUser = localStorage.getItem('pc-company-current-user');

            if (remember === 'true' && currentUser) {
                try {
                    const user = JSON.parse(currentUser);
                    console.log('Auto-filling email:', user.email);
                    document.getElementById('email').value = user.email;
                    document.getElementById('remember').checked = true;
                } catch (error) {
                    console.error('Error loading saved user:', error);
                }
            }
        });
    </script>
</body>
</html>
