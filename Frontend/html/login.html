<!DOCTYPE html>
<html lang="uk">
<script>document.documentElement.setAttribute('data-theme', localStorage.getItem('pc-company-theme') || 'light');</script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід - PC Company</title>
    <link rel="stylesheet" href="../CSS/styles.css">
    <link rel="stylesheet" href="../CSS/auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>PC Company</h1>
                <p>Введіть свої дані для входу</p>
            </div>

            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label for="email">Електронна пошта</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Введіть вашу електронну пошту"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Введіть ваш пароль"
                        required
                    >
                </div>

                <div class="form-remember">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Запам'ятати мене</label>
                </div>

                <button type="submit" class="auth-btn">Увійти</button>
            </form>

            <div class="auth-footer">
                <p>Немаєте аккаунту? <a href="register.html">Зареєструйтесь</a></p>
                <a href="index.html" class="back-link">← Повернутися на головну</a>
            </div>
        </div>
    </div>

    <script>
        // Обробник форми входу
        async function handleLogin(e) {
            e.preventDefault();

            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const rememberCheckbox = document.getElementById('remember');

            const email = emailInput.value.trim().toLowerCase();
            const password = passwordInput.value;
            const remember = rememberCheckbox.checked;

            // Валідація полів
            if (!email || !password) {
                window.showToast('Будь ласка, заповніть всі поля!', 'warning');
                return;
            }

            try {
                // Відправляємо запит на бекенд (OAuth2 form format)
                const formData = new URLSearchParams();
                formData.append('username', email);
                formData.append('password', password);

                const response = await fetch('http://127.0.0.1:8000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                if (response.ok) {
                    const tokenData = await response.json();

                    // Зберігаємо токен
                    localStorage.setItem('pc-company-token', tokenData.access_token);
                    localStorage.setItem('pc-company-logged-in', 'true');

                    // Отримуємо актуальні дані користувача з бекенду
                    try {
                        const userResponse = await fetch('http://127.0.0.1:8000/api/users/me', {
                            headers: { 'Authorization': 'Bearer ' + tokenData.access_token }
                        });
                        if (userResponse.ok) {
                            const userData = await userResponse.json();
                            localStorage.setItem('pc-company-current-user', JSON.stringify(userData));
                            localStorage.setItem('pc-company-user', JSON.stringify(userData));
                        } else {
                            throw new Error();
                        }
                    } catch (err) {
                        // Резервний варіант з localStorage
                        const savedUser = localStorage.getItem('pc-company-user');
                        if (savedUser) {
                            localStorage.setItem('pc-company-current-user', savedUser);
                        }
                    }

                    if (remember) {
                        localStorage.setItem('pc-company-remember', 'true');
                    } else {
                        localStorage.removeItem('pc-company-remember');
                    }

                    window.showToast('Вхід успішний! 👋', 'success');
                    setTimeout(() => window.location.href = 'index.html', 1500);
                } else {
                    const err = await response.json();
                    window.showToast('❌ ' + (err.detail || 'Невірний email або пароль!'), 'error');
                    passwordInput.value = '';
                }
            } catch (error) {
                window.showToast('⚠️ Сервер недоступний. Переконайтеся, що бекенд запущений.', 'error');
                console.error('Login error:', error);
            }
        }

        // Додаємо обробник до форми
        const loginForm = document.getElementById('loginForm');
        if (loginForm) {
            loginForm.addEventListener('submit', handleLogin);
        }

        // Автозаповнення при навантаженні сторінки (якщо була опція "Запам'ятати мене")
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Page loaded, checking for saved user');
            const remember = localStorage.getItem('pc-company-remember');
            const currentUser = localStorage.getItem('pc-company-current-user');

            if (remember === 'true' && currentUser) {
                try {
                    const user = JSON.parse(currentUser);
                    console.log('Auto-filling email:', user.email);
                    document.getElementById('email').value = user.email;
                    document.getElementById('remember').checked = true;
                } catch (error) {
                    console.error('Error loading saved user:', error);
                }
            }
        });
    </script>
    <script src="../JS/toast.js"></script>
</body>
</html>
