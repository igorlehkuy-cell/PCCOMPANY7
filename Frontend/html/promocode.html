<!DOCTYPE html>
<html lang="uk">

<head>
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('pc-company-theme') || 'light');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Промокоди – PCCOMPANY</title>
    <link rel="stylesheet" href="../CSS/styles.css">
</head>

<body class="promo-page">
    <!-- Header -->
    <header class="header" id="header">
        <div class="header-top">
            <div class="container">
                <a href="index.html" class="logo">PC◗Company</a>
                <nav class="nav">
                    <a href="#about" class="nav-link">Про нас</a>
                    <a href="rental.html" class="nav-link">Оренда</a>
                    <a href="rental.html" class="nav-link">Головна</a>
                    <a href="customization.html" class="nav-link">Кастомізація</a>
                    <a href="news.html" class="nav-link">📃</a>
                </nav>

                <div class="header-right">
                    <div class="auth-links">
                        <a href="login.html" class="auth-link login-link">Вхід</a>
                        <a href="register.html" class="auth-link register-link">Реєстрація</a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content promo-content">
        <div class="promo-container">
            <div class="promo-header">
                <h1 class="PCCOMPANY-logo"></h1>
                <h2 class="promo-title">Promocods</h2>
            </div>

            <div class="promo-input-card">
                <input type="text" id="promoInput" class="promo-input" placeholder="Write...">
                <button id="applyPromo" class="promo-button">Застосувати</button>
            </div>

            <!-- TikTok style flame container -->
            <div id="flameContainer" class="flame-container hidden">
                <div class="fire-icon">
                    <div class="flame main"></div>
                    <div class="flame particle-1"></div>
                    <div class="flame particle-2"></div>
                    <div class="flame particle-3"></div>
                </div>
                <p class="flame-text">Промокод активовано!</p>
            </div>
        </div>
    </main>

    <script src="../JS/toast.js"></script>
    <script>
        const promoBtn = document.getElementById('applyPromo');
        const promoInput = document.getElementById('promoInput');

        promoBtn.onclick = async () => {
            const promoCode = promoInput.value.trim().toUpperCase();
            if (!promoCode) {
                window.showToast('Введіть промокод', 'warning');
                return;
            }
            
            try {
                const res = await fetch(`https://pccompanyback.onrender.com/api/promocodes/check/${promoCode}`);
                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('pc-company-promo', data.discount_percent.toString());
                    
                    // Show flame animation
                    const flameContainer = document.getElementById('flameContainer');
                    flameContainer.classList.remove('hidden');
                    flameContainer.classList.add('active');
                    
                    // Hide input
                    document.querySelector('.promo-input-card').style.display = 'none';

                    // Redirect after 3s
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 3000);
                } else {
                    const err = await res.json();
                    window.showToast(err.detail || 'Невірний промокод!', 'error');
                }
            } catch (e) {
                window.showToast('Помилка з\'єднання з сервером', 'error');
            }
        };
    </script>
    <script src="../JS/script.js"></script>
</body>

</html>
