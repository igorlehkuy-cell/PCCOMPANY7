<!DOCTYPE html>
<html lang="uk">
<script>document.documentElement.setAttribute('data-theme', localStorage.getItem('pc-company-theme') || 'light');</script>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація - PC Company</title>
    <link rel="stylesheet" href="../CSS/styles.css">
    <link rel="stylesheet" href="../CSS/auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="auth-body">
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>PC Company</h1>
                <p>Створіть новий аккаунт</p>
            </div>

            <form class="auth-form" id="registerForm">
                <div class="form-group">
                    <label for="name">Ім'я</label>
                    <input type="text" id="name" name="name" placeholder="Введіть ваше ім'я" required>
                </div>

                <div class="form-group">
                    <label for="email">Електронна пошта</label>
                    <input type="email" id="email" name="email" placeholder="Введіть вашу електронну пошту" required>
                </div>

                <div class="form-group">
                    <label for="phone">Номер телефону</label>
                    <input type="tel" id="phone" name="phone" placeholder="+38 (0__) ___ __ __" required>
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password"
                        placeholder="Введіть пароль (мінімум 6 символів)" minlength="6" required>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Повторіть пароль</label>
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="Повторіть пароль"
                        minlength="6" required>
                </div>

                <div class="form-agree">
                    <input type="checkbox" id="agree" name="agree" required>
                    <label for="agree">Я згоден з умовами та політикою приватності</label>
                </div>

                <button type="submit" class="auth-btn">Зареєструватися</button>
            </form>

            <div class="auth-footer">
                <p>Вже маєте аккаунт? <a href="login.html">Увійти</a></p>
                <a href="index.html" class="back-link">← Повернутися на головну</a>
            </div>
        </div>
    </div>

    <script src="../JS/toast.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const registerForm = document.getElementById('registerForm');

            if (!registerForm) {
                console.error('Registration form not found!');
                return;
            }

            registerForm.addEventListener('submit', async function (e) {
                e.preventDefault();

                const name = document.getElementById('name').value.trim();
                const email = document.getElementById('email').value.trim().toLowerCase();
                const phone = document.getElementById('phone').value.trim();
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirm-password').value;
                const agree = document.getElementById('agree').checked;

                if (!agree) {
                    window.showToast('Ви повинні згодитись з умовами та політикою приватності', 'warning');
                    return;
                }

                if (!name || !email || !phone || !password) {
                    window.showToast('Будь ласка, заповніть всі поля!', 'warning');
                    return;
                }

                if (password !== confirmPassword) {
                    window.showToast('Пароль не співпадає!', 'error');
                    return;
                }

                if (password.length < 6) {
                    window.showToast('Пароль повинен бути мінімум 6 символів!', 'warning');
                    return;
                }

                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    window.showToast('Будь ласка, введіть коректну електронну пошту!', 'warning');
                    return;
                }

                try {
                    const response = await fetch('http://127.0.0.1:8000/api/users', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, email, phone, password })
                    });

                    if (response.ok) {
                        const userData = await response.json();
                        // Зберігаємо дані користувача локально для UI
                        localStorage.setItem('pc-company-user', JSON.stringify({
                            name: userData.name,
                            email: userData.email,
                            phone: userData.phone,
                            avatar: '../images/avatars/preset_1.svg'
                        }));
                        localStorage.setItem('pc-company-logged-in', 'false');

                        window.showToast('✅ Реєстрація успішна! Тепер ви можете увійти.', 'success');
                        setTimeout(() => { window.location.href = 'login.html'; }, 1500);
                    } else {
                        const err = await response.json();
                        window.showToast('❌ ' + (err.detail || 'Помилка реєстрації'), 'error');
                    }
                } catch (error) {
                    window.showToast('⚠️ Сервер недоступний. Переконайтеся, що бекенд запущений.', 'error');
                    console.error('Registration error:', error);
                }
            });
        });
    </script>
</body>

</html>
