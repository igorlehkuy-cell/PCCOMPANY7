<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація - PC Company</title>
    <link rel="stylesheet" href="../CSS/styles.css">
    <link rel="stylesheet" href="../CSS/auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>PC Company</h1>
                <p>Створіть новий аккаунт</p>
            </div>

            <form class="auth-form" id="registerForm">
                <div class="form-group">
                    <label for="name">Ім'я</label>
                    <input
                        type="text"
                        id="name"
                        name="name"
                        placeholder="Введіть ваше ім'я"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">Електронна пошта</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Введіть вашу електронну пошту"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="phone">Номер телефону</label>
                    <input
                        type="tel"
                        id="phone"
                        name="phone"
                        placeholder="+38 (0__) ___ __ __"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Введіть пароль (мінімум 6 символів)"
                        minlength="6"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="confirm-password">Повторіть пароль</label>
                    <input
                        type="password"
                        id="confirm-password"
                        name="confirm-password"
                        placeholder="Повторіть пароль"
                        minlength="6"
                        required
                    >
                </div>

                <div class="form-agree">
                    <input type="checkbox" id="agree" name="agree" required>
                    <label for="agree">Я згоден з умовами та політикою приватності</label>
                </div>

                <button type="submit" class="auth-btn">Зареєструватися</button>
            </form>

            <div class="auth-footer">
                <p>Вже маєте аккаунт? <a href="login.html">Увійти</a></p>
                <a href="index.html" class="back-link">← Повернутися на головну</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const agree = document.getElementById('agree').checked;

            console.log('Registration attempt:', { name, email, phone });

            // Перевірка згоди з умовами
            if (!agree) {
                showToast('Ви повинні згодитись з умовами та політикою приватності', 'warning');
                return;
            }

            // Перевірка на пусті поля
            if (!name || !email || !phone || !password) {
                showToast('Будь ласка, заповніть всі поля!', 'warning');
                return;
            }

            // Перевірка паролю
            if (password !== confirmPassword) {
                showToast('Паролі не співпадають!', 'error');
                return;
            }

            // Перевірка довжини пароля
            if (password.length < 6) {
                showToast('Пароль повинен бути мінімум 6 символів!', 'warning');
                return;
            }

            // Перевірка формату email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showToast('Будь ласка, введіть корректну електронну пошту!', 'warning');
                return;
            }

            try {
                // Зберігаємо дані користувача
                const userData = {
                    name: name,
                    email: email,
                    phone: phone,
                    password: password,
                    registeredAt: new Date().toISOString()
                };

                console.log('Saving user data:', userData);
                localStorage.setItem('pc-company-user', JSON.stringify(userData));
                localStorage.setItem('pc-company-logged-in', 'false');
                console.log('User data saved successfully');

                showToast('✅ Реєстрація успішна! Тепер увійдіть у свій аккаунт.', 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            } catch (error) {
                showToast('⚠️ Помилка при реєстрації. Спробуйте ще раз.', 'error');
                console.error('Registration error:', error);
            }
        });
    </script>
    <script src="../JS/toast.js"></script>
</body>
</html>
