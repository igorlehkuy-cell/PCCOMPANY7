<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>–†–µ—Ф—Б—В—А–∞—Ж—Ц—П - PC Company</title>
    <link rel="stylesheet" href="../CSS/styles.css">
    <link rel="stylesheet" href="../CSS/auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>PC Company</h1>
                <p>–°—В–≤–Њ—А—Ц—В—М –љ–Њ–≤–Є–є –∞–Ї–Ї–∞—Г–љ—В</p>
            </div>

            <form class="auth-form" id="registerForm">
                <div class="form-group">
                    <label for="name">–Ж–Љ'—П</label>
                    <input
                        type="text"
                        id="name"
                        name="name"
                        placeholder="–Т–≤–µ–і—Ц—В—М –≤–∞—И–µ —Ц–Љ'—П"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">–Х–ї–µ–Ї—В—А–Њ–љ–љ–∞ –њ–Њ—И—В–∞</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="–Т–≤–µ–і—Ц—В—М –≤–∞—И—Г –µ–ї–µ–Ї—В—А–Њ–љ–љ—Г –њ–Њ—И—В—Г"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="phone">–Э–Њ–Љ–µ—А —В–µ–ї–µ—Д–Њ–љ—Г</label>
                    <input
                        type="tel"
                        id="phone"
                        name="phone"
                        placeholder="+38 (0__) ___ __ __"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">–Я–∞—А–Њ–ї—М</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="–Т–≤–µ–і—Ц—В—М –њ–∞—А–Њ–ї—М (–Љ—Ц–љ—Ц–Љ—Г–Љ 6 —Б–Є–Љ–≤–Њ–ї—Ц–≤)"
                        minlength="6"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="confirm-password">–Я–Њ–≤—В–Њ—А—Ц—В—М –њ–∞—А–Њ–ї—М</label>
                    <input
                        type="password"
                        id="confirm-password"
                        name="confirm-password"
                        placeholder="–Я–Њ–≤—В–Њ—А—Ц—В—М –њ–∞—А–Њ–ї—М"
                        minlength="6"
                        required
                    >
                </div>

                <div class="form-agree">
                    <input type="checkbox" id="agree" name="agree" required>
                    <label for="agree">–ѓ –Ј–≥–Њ–і–µ–љ –Ј —Г–Љ–Њ–≤–∞–Љ–Є —В–∞ –њ–Њ–ї—Ц—В–Є–Ї–Њ—О –њ—А–Є–≤–∞—В–љ–Њ—Б—В—Ц</label>
                </div>

                <button type="submit" class="auth-btn">–Ч–∞—А–µ—Ф—Б—В—А—Г–≤–∞—В–Є—Б—П</button>
            </form>

            <div class="auth-footer">
                <p>–Т–ґ–µ –Љ–∞—Ф—В–µ –∞–Ї–Ї–∞—Г–љ—В? <a href="login.html">–£–≤—Ц–є—В–Є</a></p>
                <a href="index.html" class="back-link">вЖР –Я–Њ–≤–µ—А–љ—Г—В–Є—Б—П –љ–∞ –≥–Њ–ї–Њ–≤–љ—Г</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const agree = document.getElementById('agree').checked;

            console.log('Registration attempt:', { name, email, phone });

            // –Я–µ—А–µ–≤—Ц—А–Ї–∞ –Ј–≥–Њ–і–Є –Ј —Г–Љ–Њ–≤–∞–Љ–Є
            if (!agree) {
                alert('–Т–Є –њ–Њ–≤–Є–љ–љ—Ц –Ј–≥–Њ–і–Є—В–Є—Б—М –Ј —Г–Љ–Њ–≤–∞–Љ–Є —В–∞ –њ–Њ–ї—Ц—В–Є–Ї–Њ—О –њ—А–Є–≤–∞—В–љ–Њ—Б—В—Ц');
                return;
            }

            // –Я–µ—А–µ–≤—Ц—А–Ї–∞ –љ–∞ –њ—Г—Б—В—Ц –њ–Њ–ї—П
            if (!name || !email || !phone || !password) {
                alert('–С—Г–і—М –ї–∞—Б–Ї–∞, –Ј–∞–њ–Њ–≤–љ—Ц—В—М –≤—Б—Ц –њ–Њ–ї—П!');
                return;
            }

            // –Я–µ—А–µ–≤—Ц—А–Ї–∞ –њ–∞—А–Њ–ї—О
            if (password !== confirmPassword) {
                alert('–Я–∞—А–Њ–ї—Ц –љ–µ —Б–њ—Ц–≤–њ–∞–і–∞—О—В—М!');
                return;
            }

            // –Я–µ—А–µ–≤—Ц—А–Ї–∞ –і–Њ–≤–ґ–Є–љ–Є –њ–∞—А–Њ–ї—П
            if (password.length < 6) {
                alert('–Я–∞—А–Њ–ї—М –њ–Њ–≤–Є–љ–µ–љ –±—Г—В–Є –Љ—Ц–љ—Ц–Љ—Г–Љ 6 —Б–Є–Љ–≤–Њ–ї—Ц–≤!');
                return;
            }

            // –Я–µ—А–µ–≤—Ц—А–Ї–∞ —Д–Њ—А–Љ–∞—В—Г email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                alert('–С—Г–і—М –ї–∞—Б–Ї–∞, –≤–≤–µ–і—Ц—В—М –Ї–Њ—А—А–µ–Ї—В–љ—Г –µ–ї–µ–Ї—В—А–Њ–љ–љ—Г –њ–Њ—И—В—Г!');
                return;
            }

            try {
                // –Ч–±–µ—А—Ц–≥–∞—Ф–Љ–Њ –і–∞–љ—Ц –Ї–Њ—А–Є—Б—В—Г–≤–∞—З–∞
                const userData = {
                    name: name,
                    email: email,
                    phone: phone,
                    password: password,
                    registeredAt: new Date().toISOString()
                };

                console.log('Saving user data:', userData);
                localStorage.setItem('pc-company-user', JSON.stringify(userData));
                localStorage.setItem('pc-company-logged-in', 'false');
                console.log('User data saved successfully');

                alert('вЬЕ –†–µ—Ф—Б—В—А–∞—Ж—Ц—П —Г—Б–њ—Ц—И–љ–∞! –Ґ–µ–њ–µ—А —Г–≤—Ц–є–і—Ц—В—М —Г —Б–≤—Ц–є –∞–Ї–Ї–∞—Г–љ—В.');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 500);
            } catch (error) {
                alert('вЪ†пЄП –Я–Њ–Љ–Є–ї–Ї–∞ –њ—А–Є —А–µ—Ф—Б—В—А–∞—Ж—Ц—Ч. –°–њ—А–Њ–±—Г–є—В–µ —Й–µ —А–∞–Ј.');
                console.error('Registration error:', error);
            }
        });
    </script>
</body>
</html>
