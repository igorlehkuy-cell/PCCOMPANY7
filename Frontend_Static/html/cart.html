<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кошик - PC Company</title>
    <link rel="stylesheet" href="../CSS/styles.css">
    <link rel="stylesheet" href="../CSS/cart.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="header" id="header">
        <div class="header-top">
            <div class="container">
                <a href="index.html" class="logo">PC Company</a>
                <nav class="nav">
                    <a href="index.html#about" class="nav-link">Про нас</a>
                    <a href="index.html#rental" class="nav-link">Оренда</a>
                    <a href="index.html#customization" class="nav-link">Кастомізація</a>
                    <a href="index.html#sponsors" class="nav-link">Спонсори</a>
                </nav>
                <div class="header-right">
                    <button class="cart-btn" aria-label="Кошик">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="9" cy="21" r="1"></circle>
                            <circle cx="20" cy="21" r="1"></circle>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="cart-page">
        <div class="container">
            <h1 class="page-title">Ваш кошик</h1>

            <div class="cart-layout">
                <div class="cart-items">
                    <div id="cartItemsContainer">
                        <!-- Items will be rendered here -->
                    </div>
                    <div id="emptyCart" class="empty-cart">
                        <p>Кошик порожній</p>
                        <a href="index.html" class="btn-continue-shopping">Продовжити покупки</a>
                    </div>
                </div>

                <aside class="cart-summary">
                    <div class="summary-box">
                        <h2>Сума замовлення</h2>
                        <div class="summary-row">
                            <span>Товари:</span>
                            <span id="subtotal">0 грн</span>
                        </div>
                        <div class="summary-row">
                            <span>Доставка:</span>
                            <span id="shipping">50 грн</span>
                        </div>
                        <div class="summary-row total">
                            <span>Усього:</span>
                            <span id="total">0 грн</span>
                        </div>
                        <button class="btn-checkout" id="checkoutBtn">Оформити замовлення</button>
                    </div>
                </aside>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 PC Company. Всі права захищені.</p>
        </div>
    </footer>

    <script src="../JS/cart.js"></script>
</body>
</html>
